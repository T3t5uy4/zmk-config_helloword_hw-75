name: Build ZMK Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    container:
      image: zmkfirmware/zmk-build-arm:stable

    steps:
      - name: Prepare variables
        run: |
          echo "zephyr_version=${ZEPHYR_VERSION}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build tools
        run: |
          set -eux

          apt-get update
          apt-get install -y python3-pip python3-venv protobuf-compiler curl git ca-certificates

          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

          python3 -m venv /tmp/pytools
          /tmp/pytools/bin/pip install -U pip setuptools wheel
          /tmp/pytools/bin/pip install -U fonttools west

          ln -sf /tmp/pytools/bin/pyftsubset /usr/local/bin/pyftsubset
          ln -sf /tmp/pytools/bin/fonttools /usr/local/bin/fonttools || true
          ln -sf /tmp/pytools/bin/west /usr/local/bin/west || true

          npm install -g lv_font_conv

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        env:
          cache_name: cache-zephyr-${{ env.zephyr_version }}-modules
        with:
          path: |
            modules/
            zephyr/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache_name }}-${{ hashFiles('**/west.yml', '**/build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache_name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Prepare west
        run: |
          set -eux
          export PATH="/tmp/pytools/bin:$PATH"

          west init -l config
          west update --narrow || west update --narrow
          west zephyr-export
          git config --global --add safe.directory "$PWD"

      - name: West build
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          set -eux
          export PATH="/tmp/pytools/bin:$PATH"

          west build -s zmk/app -b "hw75_keyboard@1.2" -- \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
            -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/hw75_keyboard.keymap"

      - name: Collect artifacts
        run: |
          set -eux
          mkdir -p build/artifacts

          if [ -f build/zephyr/zmk.uf2 ]; then
            cp build/zephyr/zmk.uf2 build/artifacts/hw75_keyboard@1.2-zmk.uf2
          fi

          if [ -f build/zephyr/zmk.hex ]; then
            cp build/zephyr/zmk.hex build/artifacts/hw75_keyboard@1.2-zmk.hex
          fi

          if [ -f build/zephyr/zmk.bin ]; then
            cp build/zephyr/zmk.bin build/artifacts/hw75_keyboard@1.2-zmk.bin
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-hw75_keyboard-1_2
          path: build/artifacts
          if-no-files-found: error
